version: "3.9"

services:

  devcontainer:
    build:
      context: .
      target: dev
      args:
        PYTHON_VERSION: ${PYTHON_VERSION:-3.11}
        UID: ${UID:-1000}
        GID: ${GID:-1000}
    environment:
      - POETRY_PYPI_TOKEN_PYPI
    volumes:
      - ..:/workspaces
      - command-history-volume:/home/user/.history/

  dev:
    extends: devcontainer
    stdin_open: true
    tty: true
    entrypoint: []
    command:
      [
        "sh",
        "-c",
        "sudo chown user $$SSH_AUTH_SOCK && cp --update /opt/build/poetry/poetry.lock /workspaces/ngcp-logic-engine/ && mkdir -p /workspaces/ngcp-logic-engine/.git/hooks/ && cp --update /opt/build/git/* /workspaces/ngcp-logic-engine/.git/hooks/ && zsh"
      ]
    environment:
      - POETRY_PYPI_TOKEN_PYPI
      - SSH_AUTH_SOCK=/run/host-services/ssh-auth.sock
    ports:
      - "8000"
    volumes:
      - ~/.gitconfig:/etc/gitconfig
      - ~/.ssh/known_hosts:/home/user/.ssh/known_hosts
      - ${SSH_AGENT_AUTH_SOCK:-/run/host-services/ssh-auth.sock}:/run/host-services/ssh-auth.sock
    profiles:
      - dev
    depends_on:
      - redis

  redis:
    image: redis:latest
    container_name: redis
    entrypoint: ["/usr/local/bin/entrypoint.sh"]
    ports:
      - "6379:6379"
    volumes:
      - ./dev/redis/data.redis:/data/data.redis
      - ./dev/redis/entrypoint.sh:/usr/local/bin/entrypoint.sh
    environment:
      - LOGIC_ENGINE_REDIS_HOST=redis
      - LOGIC_ENGINE_REDIS_PORT=6379
      - LOGIC_ENGINE_REDIS_DB=3
    profiles:
      - dev

  app:
    build:
      context: .
      target: app
    tty: true
    ports:
      - "8000:8000"
    profiles:
      - app

volumes:
  command-history-volume:
